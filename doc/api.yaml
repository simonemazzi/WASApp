openapi: 3.0.0
info:
  title: WASATEXT
  description: API for WASATEXT messaging platform
  version: 1.0.0
tags:
  - name: Login
    description: Authentication operation (simplified).
  - name: User
    description: Operations related to users.
  - name: Conversations
    description: Operations related to chat.
  - name: Message
    description: Operations related to messages (Managing messages).
  - name: Group
    description: Operations related to groups.
  - name : Comment
    description: Operations relate to comments


paths:
  /session:
    post:
      operationId: doLogin
      summary: Do the login.
      description: If the user exists, logs them in; otherwise, creates a new user and assigns a username.
      tags:
        - "Login"
      requestBody:
        description: User's information.
        required: true
        content:
          application/json:
            schema:
              description: Login's schema
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Username"
      responses:
        201:
          description: Login successful
          content:
            application/json:
              schema:
                description: Login response's schema
                type: object
                $ref: "#/components/schemas/Login"

        404:
          $ref: "#/components/responses/NotFoundError"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/InternalError"

  /users/{userID}/info/username:
    put:
      operationId: setMyUserName
      summary: Set personalized username
      description: Let the user change his username into another.
        If the new username is available, set the new username. Otherwise, keep the last username saved and returns error.
      tags:
        - "User"
      parameters:
        - $ref: "#/components/parameters/userID"
      requestBody:
        description: New username proposed
        required: true
        content:
          application/json:
            schema:
              description: Propose's schema
              type: object
              properties:
                newUsername:
                  $ref: "#/components/schemas/Username"

      responses:
        "201":
          description: Edit successful
          content:
            application/json:
              schema:
                description: Response's schema
                type: object
                properties:
                  userID:
                    $ref: "#/components/schemas/userID"
                  Username:
                    $ref: "#/components/schemas/Username"

        404:
          $ref: "#/components/responses/NotFoundError"
        409:
          description: Username already in use
          content:
            application/json:
              schema:
                description: Response's schema
                type: object
                properties:
                  userID:
                    $ref: "#/components/schemas/userID"
                  Username:
                    $ref: "#/components/schemas/Username"
        500:
          $ref: "#/components/responses/InternalError"


  /users/{userID}/conversations:
    get:
      operationId: getMyConversations
      summary: Show User's conversations.
      description: Retrieve all user’s conversations, sorted from newest to oldest.
      tags:
        - "Conversations"
      parameters:
        - $ref: "#/components/parameters/userID"
      responses:
        "200":
          description: OK. List of conversations
          content:
            application/json:
              schema:
                description: List schema
                type: array
                minItems: 0
                items:
                  allOf:
                    - $ref: "#/components/schemas/Conversation"
                    - type: object
                      properties:
                        lastMessage:
                          description: Last message sent or received
                          allOf:
                            - $ref: "#/components/schemas/Message"
                            - type: object
                              properties:
                                sender:
                                  description: Sender of the message, you or other.
                                  $ref: "#/components/schemas/Username"
        500:
          $ref: "#/components/responses/InternalError"
        401:
          $ref: "#/components/responses/UnauthorizedError"
    post:
      summary: Create new conversation
      description: Create a new direct conversation.
      operationId: createConversation
      tags:
        - "Conversations"
      parameters:
        - $ref: "#/components/parameters/userID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              description: User schema
              $ref : "#/components/schemas/Conversation"

      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                properties:
                  conversationID:
                    $ref: "#/components/schemas/conversationID"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
        "404":
          $ref: "#/components/responses/NotFoundError"




  /users/{userID}/conversations/{conversationID}:
    get:
      summary: Show the conversation
      description: Returns the details of a single conversation identified by conversationID from the user's conversations.
      operationId: getConversation
      tags:
        - "Conversations"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/conversationID"
      responses:
        "200":
          description: Returns the chat as a list of messages.
          content:
            application/json:
              schema:
                description: List of messages
                type: array
                minLength: 0
                items:
                  allOf:
                    - $ref: "#/components/schemas/Message"
                    - type: object
                      properties:
                        sender:
                          description: Sender of the message, you or other.
                          $ref: "#/components/schemas/Username"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"



  /users/{userID}/conversations/{conversationID}/messages:
    post:
      summary: Send new direct message
      description: Send new message in the conversation.
      operationId: sendMessage
      tags:
        - "Message"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/conversationID"

      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Send"

        required: true

      responses:
        "201":
          description: Message sent. By default, the message has "read" set to sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Message"
                  - type: object
                    properties:
                      read:
                        type: string
                        enum: [ sent ]
                        example: sent

        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"


  /users/{userID}/conversations/{conversationID}/messages/{messageID}:
    delete:
      summary: Delete message
      description: From the list of sent message, the user can delete one of it.
      operationId: deleteMessage
      tags:
        - "Message"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/conversationID"
        - $ref: "#/components/parameters/messageID"
      responses:
        "204":
          $ref: "#/components/responses/DeleteComplete"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/{userID}/conversations/{conversationID}/messages/{messageID}/forwardMessage:
    post:
      summary: Forward Message
      description: From a message in a conversation, the message can be sent in another conversation.
      operationId: forwardMessage
      tags:
        - "Message"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/conversationID"
        - $ref: "#/components/parameters/messageID"
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
                - type: object
                  properties:
                    conversationID:
                      type: array
                      minItems: 1
                      items:
                        type: integer
                        example: 110056
                - type: object
                  properties:
                    groupID:
                      type: array
                      minItems: 1
                      items:
                        type: integer
                        example: 110056
        required: true
      responses:
        "201":
          description: Message forwarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"


  /users/{userID}/conversations/{conversationID}/messages/{messageID}/comments:
    get:
      summary: Get all comments of a message.
      description: From a message, the user can see all comments on this.
      operationId: getComments
      tags:
        - "Comment"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/conversationID"
        - $ref: "#/components/parameters/messageID"
      responses:
        "200":
          description: Returns the comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"


    post:
      summary: Comment Message
      description: From a message, the user can react to it by adding an emoji reaction.
      operationId: commentMessage
      tags:
        - "Comment"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/conversationID"
        - $ref: "#/components/parameters/messageID"
      requestBody:
        content:
          application/json:
            schema:
              properties:
                emoji:
                  type: string
                  description: Unicode of emoji used in the comment.
                  example: ☠️
        required: true
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        500:
          $ref: "#/components/responses/InternalError"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        400:
          $ref: "#/components/responses/BadRequest"





  /users/{userID}/conversations/{conversationID}/messages/{messageID}/comments/{commentID}:
      delete:
        summary: Delete Comment
        description: From the list of comments, the user can delete one of this.
        operationId: uncommentMessage
        tags:
          - "Comment"
        parameters:
          - $ref: "#/components/parameters/userID"
          - $ref: "#/components/parameters/conversationID"
          - $ref: "#/components/parameters/messageID"
          - $ref: "#/components/parameters/commentID"
        responses:
          204:
            $ref : "#/components/responses/DeleteComplete"
          500:
            $ref: "#/components/responses/InternalError"
          401:
            $ref: "#/components/responses/UnauthorizedError"
          404:
            $ref: "#/components/responses/NotFoundError"
          400:
            $ref: "#/components/responses/BadRequest"

  /users/{userID}/groups:
    get:
      summary: View all groups
      description: Returns the list of groups
      operationId: viewGroups
      tags:
        - "Group"
      parameters:
        - $ref : "#/components/parameters/userID"
      responses:
        200:
          description: OK. Return The list
          content:
            application/json:
              schema:
                type: array
                minItems: 0
                items:
                  $ref: "#/components/schemas/Group"
    post:
      summary: Create new group
      description: Create a new group conversation.
      operationId: createGroup
      tags:
        - "Conversations"
      parameters:
        - $ref: "#/components/parameters/userID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              description: Users schema
              $ref: "#/components/schemas/Group"

      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                properties:
                  groupID:
                    $ref: "#/components/schemas/groupID"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
        "404":
          $ref: "#/components/responses/NotFoundError"




  /users/{userID}/groups/{groupID}/members:
    put:
      summary: Add a user into the group.
      description: The user can add antoher user into the group from their userID.
      operationId: addToGroup
      tags:
        - "Group"
      parameters:
        - $ref : "#/components/parameters/userID"
        - $ref : "#/components/parameters/groupID"
      requestBody:
        content:
          application/json:
            schema:
              $ref : "#/components/schemas/User"
            example:
              userID: 11300
              Username: Simone
        required: true
      responses:
        201:
          description: User added.
        404:
          $ref: "#/components/responses/NotFoundError"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/InternalError"
    get:
      summary: List of members
      description: List all members of group
      operationId: getMembers
      tags:
        - "Group"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/groupID"
      responses:
        200:
          description: OK. Return list.
          content:
            application/json:
              schema:
                type: array
                minItems: 2
                items:
                  $ref : "#/components/schemas/User"
                example:
                  - userID: 11300
                    Username: Simone
                  - userID: 11301
                    Username: Luca
        404:
          $ref: "#/components/responses/NotFoundError"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/InternalError"




  /users/{userID}/groups/{groupID}/members/me:
    delete:
      summary: Leave the group
      description: Delete the user from the group.
      operationId: LeaveGroup
      tags:
        - "Group"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/groupID"
      responses:
        204:
          description: OK. Group Left
        404:
          $ref: "#/components/responses/NotFoundError"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/InternalError"

  /users/{userID}/groups/{groupID}/info/photo:
    put:
      summary: Set Group Photo
      description: The user can set a personalized group photo.
      operationId: setGroupPhoto
      tags:
        - "Group"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/groupID"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Photo"
      responses:
        201:
          description: Image updated.
        401:
          $ref: "#/components/responses/UnauthorizedError"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/InternalError"

  /users/{userID}/groups/{groupID}/info/name:
    put:
      summary: Set Group name
      description: The user can set a personalized group name.
      operationId: setGroupName
      tags:
        - "Group"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/groupID"
      requestBody:
        content:
          application/json:
            schema:
              properties:
                Name:
                  description: Group's name
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: capodanno 2027
      responses:
        201:
          description: Name updated.
        401:
          $ref: "#/components/responses/UnauthorizedError"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/InternalError"

  /users/{userID}/info/photo:
    put:
      summary: Change Avatar
      description: The user can edit their profile photo
      tags:
        - "User"
      operationId: setMyPhoto
      parameters:
        - $ref: "#/components/parameters/userID"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Photo"
      responses:
        201:
          description: Image updated.
        401:
          $ref: "#/components/responses/UnauthorizedError"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/InternalError"



  /users/{userID}/groups/{groupID}:
    get:
      summary: Show the conversation
      description: Returns the details of a single conversation identified by conversationID from the user's conversations.
      operationId: getGroup
      tags:
        - "Conversations"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/groupID"
      responses:
        "200":
          description: Returns the chat as a list of messages.
          content:
            application/json:
              schema:
                description: List of messages
                type: array
                minLength: 0
                items:
                  allOf:
                    - $ref: "#/components/schemas/Message"
                    - type: object
                      properties:
                        sender:
                          description: Sender of the message, you or other.
                          $ref: "#/components/schemas/Username"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"



  /users/{userID}/groups/{groupID}/messages:
    post:
      summary: Send new group message
      description: Send new message in the group.
      operationId: sendGroupMessage
      tags:
        - "Message"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/groupID"

      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Send"

        required: true

      responses:
        "201":
          description: Message sent. By default, the message has "read" set to sent.The message has "read" when all members of group has read the message.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Message"
                  - type: object
                    properties:
                      read:
                        type: string
                        enum: [ sent ]
                        example: sent

        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"


  /users/{userID}/groups/{groupID}/messages/{messageID}:
    delete:
      summary: Delete message
      description: From the list of sent message, the user can delete one of it.
      operationId: deleteGroupMessage
      tags:
        - "Message"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/groupID"
        - $ref: "#/components/parameters/messageID"
      responses:
        "204":
          $ref: "#/components/responses/DeleteComplete"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/{userID}/groups/{groupID}/messages/{messageID}/forwardMessage:
    post:
      summary: Forward Message
      description: From a message in a conversation, the message can be sent in another conversation.
      operationId: forwardGroupMessage
      tags:
        - "Message"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/groupID"
        - $ref: "#/components/parameters/messageID"
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
                - type: object
                  properties:
                    conversationID:
                      type: array
                      minItems: 1
                      items:
                        type: integer
                        example: 110056
                - type: object
                  properties:
                    groupID:
                      type: array
                      minItems: 1
                      items:
                        type: integer
                        example: 110056
        required: true
      responses:
        "201":
          description: Message forwarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"


  /users/{userID}/groups/{groupID}/messages/{messageID}/comments:
    get:
      summary: Get all comments of a message.
      description: From a message, the user can see all comments on this.
      operationId: getGroupComments
      tags:
        - "Comment"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/groupID"
        - $ref: "#/components/parameters/messageID"
      responses:
        "200":
          description: Returns the comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"


    post:
      summary: Comment Message
      description: From a message, the user can react to it by adding an emoji reaction.
      operationId: commentGroupMessage
      tags:
        - "Comment"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/groupID"
        - $ref: "#/components/parameters/messageID"
      requestBody:
        content:
          application/json:
            schema:
              properties:
                emoji:
                  type: string
                  description: Unicode of emoji used in the comment.
                  example: ☠️
        required: true
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        500:
          $ref: "#/components/responses/InternalError"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        400:
          $ref: "#/components/responses/BadRequest"





  /users/{userID}/groups/{groupID}/messages/{messageID}/comments/{commentID}:
    delete:
      summary: Delete Comment
      description: From the list of comments, the user can delete one of this.
      operationId: uncommentGroupMessage
      tags:
        - "Comment"
      parameters:
        - $ref: "#/components/parameters/userID"
        - $ref: "#/components/parameters/groupID"
        - $ref: "#/components/parameters/messageID"
        - $ref: "#/components/parameters/commentID"
      responses:
        204:
          $ref : "#/components/responses/DeleteComplete"
        500:
          $ref: "#/components/responses/InternalError"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        400:
          $ref: "#/components/responses/BadRequest"
components:
  schemas:
    Login:
      type: object
      properties:
        userID:
          $ref: "#/components/schemas/userID"
        time:
          description: Timestamp
          type: string
          format: date-time
          example: 2025-10-31T15:42:00Z

    userID:
      description: Operation User's ID
      type: integer
      example: 11300
      readOnly: true


    Username:
      description: User's Username
      type: string
      minLength: 1
      maxLength: 255
      example: Simone

    User:
      allOf:
        - $ref: "#/components/schemas/userID"
        - $ref : "#/components/schemas/Username"
      example:
        userID: 11300
        Username: Simone

    Group:
      allOf:
        - $ref: "#/components/schemas/Conversation"
        - type: object
          properties:
            name:
              example: capodanno2026
            participants:
              type: array
              minLength: 2
              items:
                $ref : "#/components/schemas/User"
              example:
                - userID: 11300
                  Username: Simone
                - userID: 11301
                  Username: Luca

    conversationID:
      description: Chat Identifier
      type: integer
      example: 110056
      readOnly: true

    commentID:
      description: Comment Identifier
      type: integer
      example: 100446
      readOnly: true
    messageID:
      description: Message Identifier
      type: integer
      example: 2635444
      readOnly: true

    groupID:
      description: Group Identifier
      type: integer
      example: 2773354
      readOnly: true

    PreviewConversation:
      description: Chat
      type: object
      properties:
        conversationID:
          $ref : "#/components/schemas/conversationID"
        name:
          description: Conversation's name
          type: string
          minLength: 1
          maxLength: 255
        avatar:
          $ref: "#/components/schemas/Photo"


    Comment:
      description: Comment schema
      type: object
      properties:
        commentID:
          $ref : "#/components/schemas/commentID"
        emoji:
          type: string
          description: Unicode of emoji used in the comment.
          example: ☠️
        time:
          description: Timestamp
          type: string
          format: date-time
          example: 2025-10-31T15:42:00Z




    Photo:
      description: Photo metadata
      type: object
      properties:
        photoID:
          type: integer
          readOnly: true
          example: 55367
        url:
          type: string
          format: uri
          description: photo's URL to access the image
          example: https://www.stoccolmaaroma.it/wp-content/uploads/2013/07/logo-sapienza.jpg
        mime:
          description: mime represents the type of the photo(image/png...)
          type: string
          example: image/jpg
        width:
          type: integer
          example: 1024
        height:
          type: integer
          example: 720

    Send:
      type: object
      properties:
        body:
          oneOf:
            - $ref: "#/components/schemas/Text"
            - $ref: "#/components/schemas/PhotoMessage"

    Message:
        allOf:
          - $ref : "#/components/schemas/Send"
          - type: object
            properties:
              messageID:
                $ref: "#/components/schemas/messageID"
              time:
                description: Timestamp
                type: string
                format: date-time
                example: 2025-10-31T15:42:00Z
              read:
                type: string
                enum: [ sent, read ]
                example: read

        #sender:
        #  description: Sender of the message, you or other.
        #  $ref: "#/components/schemas/Username"

    Text:
      description: Text of the message
      type: string
      minLength: 0
      maxLength: 2048
      example: Hello, World!

    Conversation:
      allOf:
        - $ref: "#/components/schemas/PreviewConversation"
        - type: object
          properties:
            name:
              example: user100433


    PhotoMessage:
      allOf:
        - $ref: "#/components/schemas/Photo"
        - type: object
          properties:
            caption:
              $ref: "#/components/schemas/Text"

  parameters:
    userID:
      schema:
        $ref: "#/components/schemas/userID"
      name: userID
      in: path
      required: true
      description: User Identifier

    conversationID:
      schema:
        $ref: "#/components/schemas/conversationID"
      name: conversationID
      in: path
      required: true
      description: Chat Identifier

    messageID:
      schema:
        $ref: "#/components/schemas/messageID"
      name: messageID
      in: path
      required: true
      description: Message Identifier

    commentID:
      schema:
        $ref: "#/components/schemas/commentID"
      name: commentID
      in: path
      required: true
      description: Comment Identifier

    groupID:
      schema:
        $ref: "#/components/schemas/groupID"
      name : groupID
      in: path
      required: true
      description: Group Identifier




  responses:
    UnauthorizedError:
      description: Unauthorized Action, request invalid or missing.
    InternalError:
      description: An error occurred, please retry.
    NotFoundError:
      description: Resource not found. Check the parameters.
    BadRequest:
      description: Bad Request. Invalid parameters.
    DeleteComplete:
      description: Delete success.








