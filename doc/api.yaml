openapi: 3.0.0
info:
  title: WASATEXT
  description: API for WASATEXT messaging platform
  version: 1.0.0
tags:
  - name: Login
    description: Authentication operation (simplified).
  - name: User
    description: Operations related to users.
  - name: Conversations
    description: Operations related to chat.
  - name: Message
    description: Operations related to messages (Managing messages).
  - name: Group
    description: Operations related to groups.
  - name : Comment
    description: Operations related to comments

security:
  - WASATextAuth: []


paths:
  /session:
    post:
      operationId: doLogin
      summary: Do the login
      description: If the user exists, logs them in; otherwise, creates a new user and assigns a username.
      tags:
        - "Login"
      security: [] # Disable the security, applied on other each part of the application.
      requestBody:
        description: User's information.
        required: true
        content:
          application/json:
            schema:
              description: Login's schema
              type: object
              properties:
                name:
                  allOf:
                    - $ref: "#/components/schemas/Username"
                    - description: Username of the user.
      responses:
        "201":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Login"
              example:
                userId: 19934
                time: 2025-10-31T15:42:00Z

        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /users:
    get:
      summary: Search for users by username
      description: We can find an user from a username or a part of it.
      operationId: searchUsers
      tags:
        - "User"
      parameters:
        - in: query
          name: username
          schema:
            $ref : "#/components/schemas/Username"
          description: Username or part of the username to search for. If not specified, returns all users
          required: false
      responses:
        "200":
          description: OK. List of Users( if the name is correct, there will be only one element. if the query is a part of a username, there will be a list of usernames that contains this prefix.)
          content:
            application/json:
              schema:
                description : List of users
                properties:
                  users:
                    description: array of the users
                    type: array
                    minItems: 0
                    maxItems: 99999
                    items:
                      $ref: "#/components/schemas/User"
              example:
                users: [simone, user29455]
        "500":
          $ref: "#/components/responses/InternalError"
  /users/{userId}/info/username:
    put:
      operationId: setMyUserName
      summary: Set personalized username
      description: Let the user change his username into another.
        If the new username is available, set the new username. Otherwise, keep the last username saved and returns error.
      tags:
        - "User"
      parameters:
        - $ref: "#/components/parameters/userId"
      requestBody:
        description: New username proposed
        required: true
        content:
          application/json:
            schema:
              description: Propose's schema
              type: object
              properties:
                newUsername:
                  $ref: "#/components/schemas/Username"

      responses:
        "201":
          description: Edit successful
          content:
            application/json:
              schema:
                description: Response's schema
                type: object
                properties:
                  userId:
                    $ref: "#/components/schemas/userId"
                  username:
                    $ref: "#/components/schemas/Username"
              example:
                userId: 19935
                username: simone

        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: Username already in use
          content:
            application/json:
              schema:
                description: Response's schema
                type: object
                properties:
                  userId:
                    $ref: "#/components/schemas/userId"
                  username:
                    $ref: "#/components/schemas/Username"
              example:
                userId: 19935
                username: simone
        "500":
          $ref: "#/components/responses/InternalError"


  /users/{userId}/conversations:
    parameters:
      - $ref: "#/components/parameters/userId"
    get:
      operationId: getMyConversations
      summary: Show User's conversations
      description: Retrieve all user’s conversations, sorted from newest to oldest.
      tags:
        - "Conversations"

      responses:
        "200":
          description: OK. List of conversations
          content:
            application/json:
              schema:
                description: List of the conversations
                properties:
                  conversations:
                    description: List schema
                    type: array
                    minItems: 0
                    maxItems: 99999
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Conversation"
                        - properties:
                            lastMessage:
                              description: Last message sent or received
                              allOf:
                                - $ref: "#/components/schemas/Message"
                                - type: object
                                  properties:
                                    sender:
                                      $ref: "#/components/schemas/User"

              example:

        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      summary: Create new conversation
      description: Create a new direct conversation.
      operationId: createConversation
      tags:
        - "Conversations"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref : "#/components/schemas/Conversation"

      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                description: Returns the canonical conversation
                properties:
                  conversation:
                    $ref: "#/components/schemas/Conversation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
        "404":
          $ref: "#/components/responses/NotFoundError"




  /users/{userId}/conversations/{conversationId}:
    get:
      summary: Show the conversation
      description: Returns the details of a single conversation identified by conversationId from the user's conversations.
      operationId: getConversation
      tags:
        - "Conversations"
      parameters:
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/conversationId"
      responses:
        "200":
          description: Returns the chat as a list of messages.
          content:
            application/json:
              schema:
                description: List of messages
                properties:
                  messages:
                    description: Message schema
                    type: array
                    minItems: 0
                    maxItems: 2048
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Message"
                        - properties:
                            sender:
                              allOf:
                                - $ref: "#/components/schemas/User"
                                - description: Sender of the message, you or other.

        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"



  /users/{userId}/conversations/{conversationId}/messages:
    post:
      summary: Send new direct message
      description: Send new message in the conversation.
      operationId: sendMessage
      tags:
        - "Message"
      parameters:
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/conversationId"

      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Send"

        required: true

      responses:
        "201":
          description: Message sent. By default, the message has "read" set to sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Message"
                  - type: object
                    properties:
                      read:
                        description: Show the message status
                        type: string
                        minLength: 0
                        maxLength: 255
                        pattern: "^[a-zA-Z0-9_-]+$"
                        enum: [ received ]
                        example: received

        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"


  /users/{userId}/conversations/{conversationId}/messages/{messageId}:
    delete:
      summary: Delete message
      description: From the list of sent message, the user can delete one of it.
      operationId: deleteMessage
      tags:
        - "Message"
      parameters:
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/conversationId"
        - $ref: "#/components/parameters/messageId"
      responses:
        "204":
          $ref: "#/components/responses/DeleteComplete"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/{userId}/conversations/{conversationId}/messages/{messageId}/forward_message:
    post:
      summary: Forward Message
      description: From a message in a conversation, the message can be sent in another conversation.
      operationId: forwardMessage
      tags:
        - "Message"
      parameters:
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/conversationId"
        - $ref: "#/components/parameters/messageId"
      requestBody:
        content:
          application/json:
            schema:
              description: List of message that the application has to forward
              properties:
                forwardMessages:
                  description: List of messages to forward
                  type: array
                  minItems: 1
                  maxItems: 255
                  items:
                    $ref: "#/components/schemas/ForwardItem"

        required: true
      responses:
        "201":
          description: Message forwarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"


  /users/{userId}/conversations/{conversationId}/messages/{messageId}/comments:
    parameters:
      - $ref: "#/components/parameters/userId"
      - $ref: "#/components/parameters/conversationId"
      - $ref: "#/components/parameters/messageId"
    get:
      summary: Get all comments of a message
      description: From a message, the user can see all comments on this.
      operationId: getComments
      tags:
        - "Comment"

      responses:
        "200":
          description: Returns the comments
          content:
            application/json:
              schema:
                description: List of comments
                properties:
                  comments:
                    description: List schema
                    type: array
                    minItems: 0
                    maxItems: 2048
                    items:
                      $ref: "#/components/schemas/Comment"
              example:

        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"


    post:
      summary: Comment Message
      description: From a message, the user can react to it by adding an emoji reaction.
      operationId: commentMessage
      tags:
        - "Comment"

      requestBody:
        content:
          application/json:
            schema:
              description: Comment schema
              properties:
                emoji:
                  type: string
                  description: Unicode of emoji used in the comment.
                  pattern: "^[\u0000-\uFFFF]+$"
                  minLength: 0
                  maxLength: 1024
                  example: ☠️
        required: true
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"





  /users/{userId}/conversations/{conversationId}/messages/{messageId}/comments/{commentId}:
      delete:
        summary: Delete Comment
        description: From the list of comments, the user can delete one of this.
        operationId: uncommentMessage
        tags:
          - "Comment"
        parameters:
          - $ref: "#/components/parameters/userId"
          - $ref: "#/components/parameters/conversationId"
          - $ref: "#/components/parameters/messageId"
          - $ref: "#/components/parameters/commentId"
        responses:
          "204":
            $ref : "#/components/responses/DeleteComplete"
          "500":
            $ref: "#/components/responses/InternalError"
          "401":
            $ref: "#/components/responses/UnauthorizedError"
          "404":
            $ref: "#/components/responses/NotFoundError"
          "400":
            $ref: "#/components/responses/BadRequest"

  /users/{userId}/groups:
    parameters:
      - $ref: "#/components/parameters/userId"
    get:
      summary: View all groups
      description: Returns the list of groups
      operationId: viewGroups
      tags:
        - "Group"
      parameters:
        - in : query
          name : nameGroup
          schema:
            type: string
            minLength: 0
            maxLength: 255
            pattern: "^[a-zA-Z0-9_-]+$"
            example: capodanno2026
          description: Search group by name. If this field is empty, returns all groups.
          required: false
      responses:
        "200":
          description: OK. Return The list
          content:
            application/json:
              schema:
                description: List of groups
                properties:
                  groups:
                    description: Groups schema
                    type: array
                    minItems: 0
                    maxItems: 2048
                    items:
                      $ref: "#/components/schemas/Group"
    post:
      summary: Create new group
      description: Create a new group conversation.
      operationId: createGroup
      tags:
        - "Conversations"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Group"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                properties:
                  groupId:
                    $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
        "404":
          $ref: "#/components/responses/NotFoundError"




  /users/{userId}/groups/{groupId}/members:
    parameters:
      - $ref: "#/components/parameters/userId"
      - $ref: "#/components/parameters/groupId"
    put:
      summary: Add a user into the group
      description: The user can add antoher user into the group from their userId.
      operationId: addToGroup
      tags:
        - "Group"

      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref : "#/components/schemas/User"
                - description: User we want to add
            example:
              userId: 11300
              Username: Simone
        required: true
      responses:
        "201":
          description: User added.
          content:
            application/json:
              schema:
                properties:
                  userId:
                    $ref : "#/components/schemas/User"
                  time:
                    description: Timestamp
                    type: string
                    format: date-time
                    example: 2025-10-31T15:42:00Z
                    minLength: 20
                    maxLength: 20
                    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"

        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      summary: List of members
      description: List all members of group
      operationId: getMembers
      tags:
        - "Group"

      responses:
        "200":
          description: OK. Return list.
          content:
            application/json:
              schema:
                properties:
                  Members:
                    type: array
                    minItems: 2
                    maxItems: 255
                    items:
                      $ref : "#/components/schemas/User"
                    example:
                      - userId: 11300
                        Username: Simone
                      - userId: 11301
                        Username: Luca
        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"




  /users/{userId}/groups/{groupId}/members/me:
    delete:
      summary: Leave the group
      description: Delete the user from the group.
      operationId: leaveGroup
      tags:
        - "Group"
      parameters:
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/groupId"
      responses:
        "204":
          description: OK. Group Left
        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/{userId}/groups/{groupId}/info/photo:
    put:
      summary: Set Group Photo
      description: The user can set a personalized group photo.
      operationId: setGroupPhoto
      tags:
        - "Group"
      parameters:
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/groupId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Photo"
      responses:
        "201":
          description: Image updated.
          content:
            application/json:
              schema:
                properties:
                  photoID:
                    $ref : "#/components/schemas/PhotoID"
                  time:
                    description: Timestamp
                    type: string
                    format: date-time
                    example: 2025-10-31T15:42:00Z
                    minLength: 20
                    maxLength: 20
                    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/{userId}/groups/{groupId}/info/name:
    put:
      summary: Set Group name
      description: The user can set a personalized group name.
      operationId: setGroupName
      tags:
        - "Group"
      parameters:
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/groupId"
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  description: Group's name
                  type: string
                  minLength: 1
                  maxLength: 255
                  pattern: "^[a-zA-Z0-9_-]+$"
                  example: capodanno 2027
      responses:
        "201":
          description: Name updated.
          content:
            application/json:
              schema:
                properties:
                  name:
                    description: Group's name
                    type: string
                    minLength: 1
                    maxLength: 255
                    pattern: "^[a-zA-Z0-9_-]+$"
                    example: capodanno 2027
                  time:
                    description: Timestamp
                    type: string
                    format: date-time
                    example: 2025-10-31T15:42:00Z
                    minLength: 20
                    maxLength: 20
                    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/{userId}/info/photo:
    put:
      summary: Change Avatar
      description: The user can edit their profile photo
      tags:
        - "User"
      operationId: setMyPhoto
      parameters:
        - $ref: "#/components/parameters/userId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Photo"
      responses:
        "201":
          description: Image updated.
          content:
            application/json:
              schema:
                properties:
                  PhotoID:
                    $ref: "#/components/schemas/PhotoID"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"



  /users/{userId}/groups/{groupId}:
    get:
      summary: Show the conversation
      description: Returns the details of a single conversation identified by conversationId from the user's conversations.
      operationId: getGroup
      tags:
        - "Conversations"
      parameters:
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/groupId"
      responses:
        "200":
          description: Returns the chat as a list of messages.
          content:
            application/json:
              schema:
                properties:
                  messages:
                    description: List of messages
                    type: array
                    minItems: 0
                    maxItems: 2048
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Message"
                        - properties:
                            sender:
                              allOf:
                                - $ref: "#/components/schemas/User"
                                - description: Sender of the message, you or other.
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"



  /users/{userId}/groups/{groupId}/messages:
    post:
      summary: Send new group message
      description: Send new message in the group.
      operationId: sendGroupMessage
      tags:
        - "Message"
      parameters:
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/groupId"

      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Send"

        required: true

      responses:
        "201":
          description: Message sent. By default, the message has "read" set to sent.The message has "read" when all members of group has read the message.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Message"
                  - properties:
                      read:
                        type: string
                        minLength: 0
                        maxLength: 255
                        pattern: "^[a-zA-Z0-9_-]+$"
                        enum: [ received ]
                        example: received

        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"


  /users/{userId}/groups/{groupId}/messages/{messageId}:
    delete:
      summary: Delete message
      description: From the list of sent message, the user can delete one of it.
      operationId: deleteGroupMessage
      tags:
        - "Message"
      parameters:
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/groupId"
        - $ref: "#/components/parameters/messageId"
      responses:
        "204":
          $ref: "#/components/responses/DeleteComplete"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/{userId}/groups/{groupId}/messages/{messageId}/forward_message:
    post:
      summary: Forward Message
      description: From a message in a conversation, the message can be sent in another conversation.
      operationId: forwardGroupMessage
      tags:
        - "Message"
      parameters:
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/groupId"
        - $ref: "#/components/parameters/messageId"
      requestBody:
        content:
          application/json:
            schema:
              properties:
                Forwardmessages:
                  type: array
                  items:
                    $ref: "#/components/schemas/ForwardItem"
                  minItems: 1
                  maxItems: 255
        required: true
      responses:
        "201":
          description: Message forwarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"


  /users/{userId}/groups/{groupId}/messages/{messageId}/comments:
    parameters:
      - $ref: "#/components/parameters/userId"
      - $ref: "#/components/parameters/groupId"
      - $ref: "#/components/parameters/messageId"
    get:
      summary: Get all comments of a message.
      description: From a message, the user can see all comments on this.
      operationId: getGroupComments
      tags:
        - "Comment"

      responses:
        "200":
          description: Returns the comments
          content:
            application/json:
              schema:
                properties:
                  Comments:
                    description: List of comments
                    type: array
                    minItems: 0
                    maxItems: 255
                    items:
                      $ref: "#/components/schemas/Comment"

        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"


    post:
      summary: Comment Message
      description: From a message, the user can react to it by adding an emoji reaction.
      operationId: commentGroupMessage
      tags:
        - "Comment"

      requestBody:
        content:
          application/json:
            schema:
              properties:
                emoji:
                  type: string
                  minLength: 0
                  maxLength: 1024
                  pattern: "^[\u0000-\uFFFF]+$"
                  description: Unicode of emoji used in the comment.
                  example: ☠️
        required: true
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"





  /users/{userId}/groups/{groupId}/messages/{messageId}/comments/{commentId}:
    delete:
      summary: Delete Comment
      description: From the list of comments, the user can delete one of this.
      operationId: uncommentGroupMessage
      tags:
        - "Comment"
      parameters:
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/groupId"
        - $ref: "#/components/parameters/messageId"
        - $ref: "#/components/parameters/commentId"
      responses:
        "204":
          $ref : "#/components/responses/DeleteComplete"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  schemas:
    Login:
      type: object
      properties:
        userId:
          $ref: "#/components/schemas/userId"
        time:
          description: Timestamp
          type: string
          format: date-time
          example: 2025-10-31T15:42:00Z
          minLength: 20
          maxLength: 20
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"

    userId:
      description: Operation User's ID
      type: integer
      example: 11300
      readOnly: true


    Username:
      description: User's Username
      type: string
      minLength: 1
      maxLength: 255
      pattern: "^[a-zA-Z0-9_-]+$"
      example: Simone

    User:
      description: User schema
      type: object
      properties:
        userId:
          $ref: "#/components/schemas/userId"
        Username:
          $ref: "#/components/schemas/Username"
      required:
        - userId
        - Username

    Group:
      allOf:
        - $ref: "#/components/schemas/Conversation"
        - properties:
            name:
              description: Group name
              type: string
              minLength: 0
              maxLength: 255
              pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
              example: capodanno2026
            participants:
              type: array
              minItems: 2
              maxItems: 256
              items:
                $ref : "#/components/schemas/User"
              example:
                - userId: 11300
                  Username: Simone
                - userId: 11301
                  Username: Luca

    conversationId:
      description: Chat Identifier
      type: integer
      example: 110056
      readOnly: true

    commentId:
      description: Comment Identifier
      type: integer
      example: 100446
      readOnly: true
    messageId:
      description: Message Identifier
      type: integer
      example: 2635444
      readOnly: true

    groupId:
      description: Group Identifier
      type: integer
      example: 2773354
      readOnly: true

    PreviewConversation:
      description: Chat
      type: object
      properties:
        conversationId:
          $ref : "#/components/schemas/conversationId"
        name:
          description: Conversation's name
          type: string
          minLength: 1
          maxLength: 255
          pattern: "^[a-zA-Z0-9_-]+$"
        avatar:
          $ref: "#/components/schemas/Photo"


    Comment:
      description: Comment schema
      type: object
      properties:
        commentId:
          $ref : "#/components/schemas/commentId"
        emoji:
          type: string
          description: Unicode of emoji used in the comment.
          pattern: "^[\u0000-\uFFFF]+$"
          example: ☠️
        time:
          description: Timestamp
          type: string
          minLength: 20
          maxLength: 20
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
          format: date-time
          example: 2025-10-31T15:42:00Z




    Photo:
      description: Photo metadata
      type: object
      properties:
        photoID:
          $ref: "#/components/schemas/PhotoID"
        url:
          type: string
          minLength: 1
          maxLength: 255
          pattern: "^[a-zA-Z]+://.+$"
          format: url
          description: photo's URL to access the image
          example: https://www.stoccolmaaroma.it/wp-content/uploads/2013/07/logo-sapienza.jpg
        mime:
          description: mime represents the type of the photo(image/png...)
          type: string
          minLength: 0
          maxLength: 255
          pattern: '^[a-zA-Z0-9]+/[a-zA-Z0-9.+_-]+$'
          example: image/jpg
        width:
          type: integer
          example: 1024
        height:
          type: integer
          example: 720

    Send:
      type: object
      description: What to send, Image or text
      properties:
        body:
          oneOf:
            - $ref: "#/components/schemas/Text"
            - $ref: "#/components/schemas/PhotoMessage"

    Message:
        allOf:
          - $ref : "#/components/schemas/Send"
          - properties:
              messageId:
                $ref: "#/components/schemas/messageId"
              time:
                description: Timestamp
                type: string
                format: date-time
                example: 2025-10-31T15:42:00Z
                minLength: 20
                maxLength: 20
                pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"

              read:
                type: string
                minLength: 0
                maxLength: 255
                description: Read state of the message
                pattern: "^[a-zA-Z0-9_-]+$"
                enum: [ received, read ]
                example: received

    Text:
      description: Text of the message
      type: string
      minLength: 0
      maxLength: 2048
      example: Hello, World!
      pattern: "^[a-zA-Z0-9_-]+$"

    Conversation:
      allOf:
        - $ref: "#/components/schemas/PreviewConversation"
        - properties:
            name:
              $ref : "#/components/schemas/Username"

    PhotoID:
      type: integer
      readOnly: true
      example: 55367
    PhotoMessage:
      description: The user can send an image with an optional description.
      allOf:
        - $ref: "#/components/schemas/Photo"
        - properties:
            caption:
              $ref: "#/components/schemas/Text"
    ForwardItem:
      type: object
      properties:
        type:
          type: string
          minLength: 0
          maxLength: 255
          pattern: "^[a-zA-Z0-9_-]+$"
          enum: [ conversation, group ]
          description: kind of destination (conversations or groups).
          example: conversation
        id:
          description: destination ID (conversationId o groupId).
          oneOf:
            - $ref: "#/components/schemas/conversationId"
            - $ref: "#/components/schemas/groupId"
      required:
        - type
        - id
    Error:
      type: object
      properties:
        code:
          type: integer
          example: 401
        message:
          type: string
          minLength : 0
          maxLength: 2048
          example: Unauthorized Action, request invalid or missing.
      required:
        - code
        - message

  parameters:
    userId:
      name: userId
      in: path
      required: true
      description: User Identifier
      schema:
        $ref: "#/components/schemas/userId"

    conversationId:
      name: conversationId
      in: path
      required: true
      description: Chat Identifier
      schema:
        $ref: "#/components/schemas/conversationId"

    messageId:
      name: messageId
      in: path
      required: true
      description: Message Identifier
      schema:
        $ref: "#/components/schemas/messageId"

    commentId:
      name: commentId
      in: path
      required: true
      description: Comment Identifier
      schema:
        $ref: "#/components/schemas/commentId"

    groupId:
      name : groupId
      in: path
      required: true
      description: Group Identifier
      schema:
        $ref: "#/components/schemas/groupId"

  securitySchemes:
    WASATextAuth:
      type: http
      description: Protect operation session token.
      scheme: bearer
      bearerFormat: SessionToken


  responses:
    UnauthorizedError:
      description: Unauthorized Action, request invalid or missing.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 401
            message: "Unauthorized Action, request invalid or missing."
    InternalError:
      description: An error occurred, please retry.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 500
            message: "An error occurred, please retry."
    NotFoundError:
      description: Resource not found. Check the parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 404
            message: "Resource not found. Check the parameters."
    BadRequest:
      description: Bad Request. Invalid parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 400
            message: "Bad Request. Invalid parameters."
    DeleteComplete:
      description: Delete success.
